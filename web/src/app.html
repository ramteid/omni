<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link
            rel="icon"
            href="%sveltekit.assets%/favicon-dark.png"
            media="(prefers-color-scheme: dark)" />
        <link rel="icon" href="%sveltekit.assets%/favicon-light.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
            ;(function () {
                try {
                    var prefs = JSON.parse(localStorage.getItem('omni-user-preferences') || '{}')
                    if (prefs.theme === 'bright') {
                        prefs.theme = 'light'
                    }
                    if (prefs.theme) {
                        var effectiveTheme = prefs.theme
                        if (prefs.theme === 'system') {
                            effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)')
                                .matches
                                ? 'dark'
                                : 'light'
                        }
                        document.documentElement.setAttribute('data-theme', effectiveTheme)
                        // themeColorScheme was added later; fall back to effective theme-id check for migration
                        var isDark =
                            prefs.theme === 'system'
                                ? effectiveTheme === 'dark'
                                : prefs.themeColorScheme
                                  ? prefs.themeColorScheme === 'dark'
                                  : effectiveTheme === 'dark'
                        if (isDark) {
                            document.documentElement.classList.add('dark')
                        }
                    }
                } catch (e) {}
            })()
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
